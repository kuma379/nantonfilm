kind = "web"
previewPath = "/"
title = "NantonFilm"
version = "1.0.0"
id = "artifacts/nonton-film"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20285

[services.development]
run = "pnpm --filter @workspace/nonton-film run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nonton-film", "run", "build" ]
publicDir = "artifacts/nonton-film/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20285"
BASE_PATH = "/"
